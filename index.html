<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>prontopop</title>
  <style>
    body { font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
           font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
           margin: 1rem auto; max-width: 64rem; padding: 0 1rem; }
    input, select, button { font-family: inherit; font-size: inherit;
                            font-variant-ligatures: none;
                            font-feature-settings: "liga" 0, "calt" 0, "dlig" 0; }
    input.pattern { letter-spacing: 0.2ch; }
    button { padding: 0.3rem 0.8rem; border-radius: 0.5rem; border: 1px solid #999;
             background: #e4e4e4; cursor: pointer; }
    button:hover { background: #d4d4d4; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5ch; align-items: center; margin: 0.5rem 0; }
    .songrow { display: grid; gap: 0.5ch; align-items: center; margin: 0.25rem 0;
               grid-template-columns: 7ch minmax(16ch, 2fr) 5ch 5ch minmax(16ch, 2fr) 8ch; }
    .songrow input { min-width: 0; }
    .status { margin-top: 1rem; min-height: 1.5em; }
    .row h2 { margin: 0.5rem 0; }
    .silence { background: #c62828; color: white; border: 1px solid #8e1c1c; }
    .silence:hover { background: #a02020; }
    .playing { background: #2e7d32; color: white; border: 1px solid #1b5e20; }
    .playing:hover { background: #256428; }
    @media (max-width: 44rem) {
      .songrow { grid-template-columns: 1fr 1fr; }
      .songrow.header { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="main.js"></script>
</body>
</html>
